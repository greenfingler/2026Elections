  {state:'Tennessee',abbr:'TN',incumbent:'Bill Hagerty',party:'R',rating:'Safe R',margin:'',notes:'',candidates:{R:{name:'Bill Hagerty',on:true},D:{name:'',on:false},I:{name:'',on:false}},isFlip:false,isSpecial:false},
  {state:'Texas',abbr:'TX',incumbent:'John Cornyn',party:'R',rating:'Lean R',margin:'',notes:'TBD (R) vs. James Talarico (D)',candidates:{R:{name:'John Cornyn',on:true},D:{name:'James Talarico',on:true},I:{name:'',on:false}},isFlip:false,isSpecial:false},
  {state:'Virginia',abbr:'VA',incumbent:'Mark Warner',party:'D',rating:'Safe D',margin:'',notes:'',candidates:{R:{name:'',on:true},D:{name:'Mark Warner',on:true},I:{name:'',on:false}},isFlip:false,isSpecial:false},
  {state:'West Virginia',abbr:'WV',incumbent:'Shelley Moore Capito',party:'R',rating:'Safe R',margin:'',notes:'',candidates:{R:{name:'Shelley Moore Capito',on:true},D:{name:'',on:false},I:{name:'',on:false}},isFlip:false,isSpecial:false},
  {state:'Wyoming',abbr:'WY',incumbent:'Cynthia Lummis',party:'R',rating:'Safe R',margin:'',notes:'',candidates:{R:{name:'Cynthia Lummis',on:true},D:{name:'',on:false},I:{name:'',on:false}},isFlip:false,isSpecial:false},
];

let changelog = [];
let selectedRace = null;
let searchQuery = '';
let activeFilter = 'All';
let changelogOpen = true;

function loadSaved() {
  try {
    const s = localStorage.getItem('elections2026v2');
    if(s) { const d=JSON.parse(s); if(d.races) races=d.races; if(d.changelog) changelog=d.changelog; }
  } catch(e) {}
}

function saveData() {
  try { localStorage.setItem('elections2026v2', JSON.stringify({races,changelog})); } catch(e) {}
}

function exportData() {
  const b = new Blob([JSON.stringify({races,changelog},null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='2026_senate_ratings.json'; a.click();
}

function getRatingColor(r) { return RATING_COLORS[r]||'#555'; }

function formatTime(ts) {
  const d=new Date(ts);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' ' +
    d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}

function computeCounts() {
  let dem=0,rep=0,toss=0; const rc={};
  races.forEach(r=>{
    rc[r.rating]=(rc[r.rating]||0)+1;
    if(r.rating==='Tossup') toss++;
    else if(r.rating.includes('R')) rep++;
    else if(r.rating.includes('D')) dem++;
  });
  return {dem,rep,toss,rc};
}

function buildCandidateStr(r) {
  const p=[];
  if(r.candidates.R.on&&r.candidates.R.name) p.push('<span style="color:#f87171">'+r.candidates.R.name+' (R)</span>');
  if(r.candidates.D.on&&r.candidates.D.name) p.push('<span style="color:#60a5fa">'+r.candidates.D.name+' (D)</span>');
  if(r.candidates.I.on&&r.candidates.I.name) p.push('<span style="color:#c084fc">'+r.candidates.I.name+' (I)</span>');
  return p.join(' <span style="color:var(--text3)">vs.</span> ')||('<span style="color:var(--text3)">'+r.incumbent+'</span>');
}

function renderAll() {
  renderMap(); renderSummaryBar(); renderRaceList(); renderChangelog(); saveData();
}

function renderSummaryBar() {
  const {dem,rep,toss,rc}=computeCounts();
  document.getElementById('demCount').textContent=dem;
  document.getElementById('repCount').textContent=rep;
  document.getElementById('tossCount').textContent=toss;
  document.getElementById('senateCount').textContent=races.length;
  document.getElementById('ratingPills').innerHTML=RATINGS.map(r=>{
    const c=rc[r]||0; if(!c) return '';
    return '<div class="rating-pill"><div class="rating-dot" style="background:'+getRatingColor(r)+'"></div>'+r+' <strong style="color:var(--text)">'+c+'</strong></div>';
  }).join('');
  if(changelog.length) document.getElementById('lastUpdated').textContent='Updated '+formatTime(changelog[changelog.length-1].ts);
}

function renderMap() {
  const svg=document.getElementById('electionMap'); if(!svg) return;
  races.forEach(r=>{
    const el=svg.getElementById(r.abbr); if(!el) return;
    el.style.fill=getRatingColor(r.rating);
    if(r.isFlip) { el.style.stroke='#fbbf24'; el.style.strokeWidth='2.5'; }
    else { el.style.stroke=''; el.style.strokeWidth=''; }
  });
}

function renderRaceList() {
  const q=searchQuery.toLowerCase();
  const filtered=races.filter(r=>{
    if(q){
      const m=r.state.toLowerCase().includes(q)||r.incumbent.toLowerCase().includes(q)||
        Object.values(r.candidates).some(c=>c.name.toLowerCase().includes(q));
      if(!m) return false;
    }
    if(activeFilter==='All') return true;
    if(activeFilter==='Flips') return r.isFlip;
    if(activeFilter==='Competitive') return ['Tossup','Tilt R','Tilt D','Lean R','Lean D'].includes(r.rating);
    return r.rating===activeFilter;
  });
  const list=document.getElementById('raceList');
  if(!filtered.length){list.innerHTML='<div class="no-results">No races match</div>';return;}
  list.innerHTML=filtered.map(r=>{
    const color=getRatingColor(r.rating);
    const tc=['Tilt R','Tilt D'].includes(r.rating)?'#111':'#fff';
    const sel=selectedRace&&selectedRace.abbr===r.abbr;
    return '<div class="race-item'+(sel?' selected':'')+'" onclick="selectRace(''+r.abbr+'')">' +
      '<div class="race-rating-stripe" style="background:'+color+'"></div>' +
      '<div class="race-info">' +
        '<div class="race-state">'+r.state+(r.isSpecial?' <span class="state-special">Special</span>':'')+(r.isFlip?' <span class="flip-badge">FLIP</span>':'')+'</div>' +
        '<div class="race-incumbent">'+buildCandidateStr(r)+'</div>' +
      '</div>' +
      '<div class="race-rating-badge" style="background:'+color+'22;color:'+color+';border:1px solid '+color+'44;font-size:10px;padding:2px 7px;border-radius:4px;font-family:DM Mono,monospace;white-space:nowrap;font-weight:500">'+r.rating+'</div>' +
    '</div>';
  }).join('');
}

function renderFilterBar() {
  const filters=['All','Competitive','Flips',...RATINGS];
  document.getElementById('filterBar').innerHTML=filters.map(f=>
    '<div class="filter-chip'+(activeFilter===f?' active':'')+'" onclick="setFilter(''+f+'')">'+f+'</div>'
  ).join('');
}

function renderChangelog() {
  const cl=document.getElementById('changelogList');
  document.getElementById('changelogCount').textContent=changelog.length;
  if(!changelog.length){cl.innerHTML='<div class="no-results">No changes yet</div>';return;}
  cl.innerHTML=[...changelog].reverse().map(e=>
    '<div class="changelog-entry">' +
      '<span class="cl-time">'+formatTime(e.ts)+'</span>' +
      '<span class="cl-state">'+e.state+'</span>' +
      '<span style="color:var(--text3)">&#8594;</span>' +
      '<span style="font-size:10px;font-family:DM Mono,monospace;padding:1px 5px;border-radius:3px;background:'+getRatingColor(e.from)+'22;color:'+getRatingColor(e.from)+'">'+e.from+'</span>' +
      '<span style="color:var(--text3)">&#8594;</span>' +
      '<span style="font-size:10px;font-family:DM Mono,monospace;padding:1px 5px;border-radius:3px;font-weight:600;background:'+getRatingColor(e.to)+'33;color:'+getRatingColor(e.to)+'">'+e.to+'</span>' +
    '</div>'
  ).join('');
}

function renderEditPanel(race) {
  const panel=document.getElementById('editPanel');
  const title=document.getElementById('editTitle');
  const content=document.getElementById('editContent');
  if(!race){panel.style.display='none';return;}
  panel.style.display='block';
  title.innerHTML=race.state+(race.isFlip?' <span class="flip-badge">FLIP</span>':'')+
    (race.isSpecial?' <span class="state-special" style="font-size:12px">Special</span>':'');
  const ratingBtns=RATINGS.map(r=>{
    const c=getRatingColor(r); const tc=['Tilt R','Tilt D'].includes(r)?'#111':'#fff';
    const sel=race.rating===r;
    return '<div class="rating-btn'+(sel?' selected':'')+'" ' +
      'style="'+(sel?'background:'+c+';color:'+tc+';border-color:'+c+';':'')+'" ' +
      'onclick="updateRating(''+race.abbr+'',''+r+'')">'+r+'</div>';
  }).join('');
  content.innerHTML=
    '<div class="edit-section">' +
      '<div class="edit-section-label">Candidates</div>' +
      ['R','D','I'].map(p=>
        '<div class="candidate-row">' +
          '<div class="candidate-toggle'+(race.candidates[p].on?' on':'')+'" onclick="toggleCandidate(''+race.abbr+'',''+p+'')" id="ctog_'+race.abbr+'_'+p+'"></div>' +
          '<div class="candidate-party '+p+'">'+p+'</div>' +
          '<input class="candidate-input" id="cinp_'+race.abbr+'_'+p+'" value="'+escapeHtml(race.candidates[p].name)+'" ' +
            'placeholder="'+(p==='R'?'Republican nominee':p==='D'?'Democratic nominee':'Independent nominee')+'" ' +
            'oninput="updateCandidate(''+race.abbr+'',''+p+'',this.value)" ' +
            (race.candidates[p].on?'':'disabled')+'>'+
        '</div>'
      ).join('') +
    '</div>' +
    '<div class="edit-section">' +
      '<div class="edit-section-label">Race Rating</div>' +
      '<div class="rating-grid">'+ratingBtns+'</div>' +
    '</div>' +
    '<div class="edit-section">' +
      '<div class="edit-section-label">Projected Margin</div>' +
      '<input class="margin-input" value="'+escapeHtml(race.margin||'')+'" placeholder="e.g. R+4, D+2, Toss" oninput="updateMargin(''+race.abbr+'',this.value)">' +
    '</div>' +
    '<div class="edit-section">' +
      '<div class="edit-section-label">Notes</div>' +
      '<textarea class="notes-input" placeholder="Notes&#8230;" oninput="updateNotes(''+race.abbr+'',this.value)">'+escapeHtml(race.notes||'')+'</textarea>' +
    '</div>' +
    '<div class="flip-toggle-row">' +
      '<span class="flip-toggle-label">Mark as Seat Flip</span>' +
      '<div class="candidate-toggle'+(race.isFlip?' on':'')+'" onclick="toggleFlip(''+race.abbr+'')" id="flipTog_'+race.abbr+'"></div>' +
    '</div>';
}

function escapeHtml(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function selectRace(abbr) {
  selectedRace=races.find(r=>r.abbr===abbr)||null;
  renderRaceList(); renderEditPanel(selectedRace);
  if(selectedRace){
    const el=document.querySelector('[onclick="selectRace(''+abbr+'')"]');
    if(el) el.scrollIntoView({block:'nearest'});
  }
}

function setFilter(f){activeFilter=f;renderFilterBar();renderRaceList();}
function filterRaces(){searchQuery=document.getElementById('searchInput').value;renderRaceList();}
function toggleCandidate(abbr,party){const r=races.find(x=>x.abbr===abbr);if(!r)return;r.candidates[party].on=!r.candidates[party].on;renderAll();renderEditPanel(r);}
function updateCandidate(abbr,party,val){const r=races.find(x=>x.abbr===abbr);if(!r)return;r.candidates[party].name=val;renderRaceList();saveData();}
function updateRating(abbr,nr){
  const r=races.find(x=>x.abbr===abbr);if(!r||r.rating===nr)return;
  const old=r.rating; r.rating=nr;
  changelog.push({ts:Date.now(),state:r.state,abbr,from:old,to:nr});
  renderAll(); renderEditPanel(r);
}
function updateMargin(abbr,v){const r=races.find(x=>x.abbr===abbr);if(!r)return;r.margin=v;saveData();}
function updateNotes(abbr,v){const r=races.find(x=>x.abbr===abbr);if(!r)return;r.notes=v;saveData();}
function toggleFlip(abbr){const r=races.find(x=>x.abbr===abbr);if(!r)return;r.isFlip=!r.isFlip;renderAll();renderEditPanel(r);}
function toggleChangelog(){
  changelogOpen=!changelogOpen;
  document.getElementById('changelogList').style.display=changelogOpen?'':'none';
  document.getElementById('changelogToggleIcon').textContent=changelogOpen?'&#9650;':'&#9660;';
}
function switchTab(t){}

function initMap() {
  const container=document.getElementById('mapContainer');
  const tmpl=document.getElementById('svgTemplate');
  if(!tmpl) return;
  const div=document.createElement('div');
  div.innerHTML=tmpl.textContent||tmpl.innerHTML;
  const svg=div.querySelector('svg');
  if(!svg) return;
  svg.id='electionMap';
  svg.style.cssText='width:100%;height:100%;max-height:440px;display:block;';
  container.insertBefore(svg,container.firstChild);
  const tooltip=document.getElementById('mapTooltip');
  svg.querySelectorAll('[id]').forEach(el=>{
    const abbr=el.id; if(abbr.length!==2||abbr==='DC') return;
    el.style.cursor='pointer';
    el.addEventListener('mousemove',e=>{
      const race=races.find(r=>r.abbr===abbr); if(!race) return;
      const rect=container.getBoundingClientRect();
      const x=e.clientX-rect.left, y=e.clientY-rect.top;
      const color=getRatingColor(race.rating);
      const tc=['Tilt R','Tilt D'].includes(race.rating)?'#111':'#fff';
      tooltip.style.display='block';
      tooltip.style.left=Math.min(x+14,rect.width-220)+'px';
      tooltip.style.top=Math.max(y-70,4)+'px';
      tooltip.innerHTML='<div class="tt-state">'+race.state+(race.isSpecial?' <span class="state-special">Special</span>':'')+(race.isFlip?' <span class="flip-badge">FLIP</span>':'')+'</div>'+
        '<div style="font-size:11px;color:var(--text2);margin-bottom:5px">'+buildCandidateStr(race)+'</div>'+
        '<div style="background:'+color+'22;color:'+color+';padding:2px 8px;border-radius:4px;display:inline-block;font-family:DM Mono,monospace;font-size:11px">'+race.rating+'</div>'+
        (race.margin?' <span style="color:var(--text3);font-size:10px;font-family:DM Mono,monospace;margin-left:6px">'+race.margin+'</span>':'');
    });
    el.addEventListener('mouseleave',()=>{tooltip.style.display='none';});
    el.addEventListener('click',()=>{const race=races.find(r=>r.abbr===abbr);if(race)selectRace(abbr);});
  });
  renderMap();
}

loadSaved();
renderFilterBar();
renderAll();
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',initMap);}
else{setTimeout(initMap,0);}
</script>
